<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULUX — Light for Life</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060a12;
            color: #e0e4ec;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 35% 40%, rgba(180, 140, 60, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 65% 55%, rgba(60, 160, 140, 0.06) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 70%, rgba(80, 120, 180, 0.05) 0%, transparent 50%);
            animation: glow 16s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            100% { transform: translate(-20px, -10px) scale(1.02); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 640px;
            animation: fadeUp 1.4s ease-out;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #f0ece4 0%, #c8a96e 50%, #8bbcb0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: rgba(200, 169, 110, 0.45);
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 169, 110, 0.3), rgba(139, 188, 176, 0.3), transparent);
            margin: 2rem auto;
        }

        .welcome {
            font-size: 1.05rem;
            font-weight: 300;
            line-height: 2.1;
            color: rgba(224, 228, 236, 0.65);
            letter-spacing: 0.01em;
        }

        .welcome strong {
            font-weight: 500;
            color: rgba(224, 228, 236, 0.88);
        }

        /* 아이콘 영역 */
        .icons {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 2rem;
            animation: fadeIn 2s ease-out 0.6s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .icons svg {
            width: 28px;
            height: 28px;
            opacity: 0.25;
            transition: opacity 0.4s ease;
        }

        .icons svg:hover {
            opacity: 0.45;
        }

        .footer {
            margin-top: 3.5rem;
            font-size: 0.75rem;
            color: rgba(224, 228, 236, 0.18);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HULUX</div>
        <div class="tagline">LIGHT FOR LIFE</div>
        <div class="divider"></div>
        <p class="welcome">
            <strong>HULUX 홈페이지에 방문해 주셔서 감사합니다.</strong><br>
            빛으로 더 건강한 내일을 열어갑니다.
        </p>
        <div class="icons">
            <!-- LED / Light -->
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(200,169,110,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <!-- Neural / Brain -->
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(139,188,176,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.5v1a3.5 3.5 0 0 1 3 3.5 3.5 3.5 0 0 1-2.2 3.2A3 3 0 0 1 12 20a3 3 0 0 1-2.8-2.8A3.5 3.5 0 0 1 7 14a3.5 3.5 0 0 1 3-3.5v-1A4 4 0 0 1 8 6a4 4 0 0 1 4-4z"/>
                <circle cx="12" cy="10" r="1"/>
                <circle cx="9.5" cy="14.5" r="0.8"/>
                <circle cx="14.5" cy="14.5" r="0.8"/>
            </svg>
            <!-- DNA / Bio -->
            <svg viewBox="0 0 24 24" fill="none" stroke="rgba(140,160,200,0.8)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 2c0 4 3 6 5 8s5 4 5 8"/>
                <path d="M17 2c0 4-3 6-5 8s-5 4-5 8"/>
                <line x1="7" y1="5" x2="17" y2="5"/>
                <line x1="7" y1="9" x2="17" y2="9"/>
                <line x1="7" y1="15" x2="17" y2="15"/>
                <line x1="7" y1="19" x2="17" y2="19"/>
            </svg>
        </div>
        <div class="footer">&copy; 2026 HULUX. All rights reserved.</div>
    </div>
</body>
</html>
