<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULUX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f1c;
            color: #e8eaf0;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(30, 80, 160, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 60, 180, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(20, 100, 140, 0.1) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-30px, -20px) rotate(2deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 600px;
            animation: fadeUp 1.2s ease-out;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 700;
            letter-spacing: 0.35em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #e8eaf0 0%, #8fa8d4 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(140, 170, 220, 0.5), transparent);
            margin: 1.8rem auto;
        }

        .welcome {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 2;
            color: rgba(232, 234, 240, 0.7);
            letter-spacing: 0.02em;
        }

        .welcome strong {
            font-weight: 500;
            color: rgba(232, 234, 240, 0.9);
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.78rem;
            color: rgba(232, 234, 240, 0.25);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">HULUX</div>
        <div class="divider"></div>
        <p class="welcome">
            <strong>HULUX 홈페이지에 방문해 주셔서 감사합니다.</strong><br>
            더 나은 서비스로 찾아뵙겠습니다.
        </p>
        <div class="footer">&copy; 2026 HULUX. All rights reserved.</div>
    </div>
</body>
</html>
