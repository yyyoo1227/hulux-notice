<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULUX — 해산 및 채권신고공고</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060a12;
            color: #e0e4ec;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(ellipse at 35% 40%, rgba(180, 140, 60, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 65% 55%, rgba(60, 160, 140, 0.06) 0%, transparent 45%),
                radial-gradient(ellipse at 50% 70%, rgba(80, 120, 180, 0.05) 0%, transparent 50%);
            animation: glow 16s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes glow {
            0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
            100% { transform: translate(-20px, -10px) scale(1.02); opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            max-width: 720px;
            width: 100%;
            animation: fadeUp 1.4s ease-out;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(24px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 3.4rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            margin-bottom: 0.3rem;
            background: linear-gradient(135deg, #f0ece4 0%, #c8a96e 50%, #8bbcb0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .tagline {
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.25em;
            color: rgba(200, 169, 110, 0.45);
            margin-bottom: 0.5rem;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 169, 110, 0.3), rgba(139, 188, 176, 0.3), transparent);
            margin: 2rem auto;
        }

        .notice-img {
            margin-top: 0.5rem;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            animation: fadeIn 2s ease-out 0.4s both;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .notice-img img {
            display: block;
            width: 100%;
            height: auto;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-top: 2.5rem;
            animation: fadeIn 2s ease-out 0.8s both;
        }

        .icons svg {
            width: 24px;
            height: 24px;
            opacity: 0.18;
            transition: opacity 0.4s ease;
        }

        .icons svg:hover {
            opacity: 0.35;
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: rgba(224, 228, 236, 0.15);
            letter-spacing: 0.05em;
        }

        @media (max-width: 600px) {
            .container { padding: 2rem 1rem; }
            .logo { font-size: 2.4rem; }
        }
    </style>
</head>
